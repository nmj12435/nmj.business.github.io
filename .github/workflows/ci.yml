name: CI

# Build the Jekyll site and validate it on every push and PR. This acts as the
# site's "test suite": if the build breaks, the output contains broken links /
# invalid markup, or a page has accessibility violations, the check fails
# before anything is merged or deployed.

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Allow one concurrent run per ref; cancel stale runs on new pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # Force a UTF-8 locale so tools that read the built HTML (e.g. html-proofer
    # via nokogiri) parse the site's non-ASCII content correctly regardless of
    # the runner's default locale.
    env:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          # Installs gems from the Gemfile and caches them between runs.
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build --trace
        env:
          # Build in development mode for the link check. In production the
          # github-pages gem rewrites url/baseurl from the Pages API, which
          # prefixes every relative link with the site's baseurl and points
          # html-proofer at paths outside the built _site/ tree. Development
          # mode keeps links root-relative (and skips the API call entirely),
          # which is what we want for validating internal links against _site/.
          JEKYLL_ENV: development

      - name: Validate HTML and links
        # html-proofer checks the built _site/ for broken internal links,
        # missing images, and malformed HTML.
        #
        # - external link checking is disabled to keep CI deterministic and
        #   fast (external sites go down / rate-limit); flip `disable_external`
        #   to false if you want outbound links verified too.
        run: |
          bundle exec htmlproofer ./_site \
            --disable-external \
            --allow-hash-href \
            --ignore-empty-alt \
            --no-enforce-https

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install accessibility tooling
        # Installs pa11y-ci (and its bundled headless Chromium) from the lockfile.
        run: npm ci

      - name: Accessibility scan
        # Serve the built site locally and run pa11y-ci against every page in
        # the sitemap, checking each against WCAG 2.1 AA. The sitemap's URLs
        # are rewritten from the production host to localhost (see the
        # `test:a11y` script in package.json), so new pages are covered
        # automatically without editing this workflow.
        run: |
          python3 -m http.server 8080 --directory _site &
          server_pid=$!
          # Wait until the static server is accepting connections.
          for _ in $(seq 1 20); do
            if curl -sf http://127.0.0.1:8080/sitemap.xml >/dev/null; then
              break
            fi
            sleep 0.5
          done
          npm run test:a11y
          status=$?
          kill "$server_pid" 2>/dev/null || true
          exit $status

      - name: Lint Markdown
        # Style/consistency checks on all Markdown sources.
        run: npm run lint:md

      - name: Spell-check content
        # Catches typos in Markdown content (dictionary in cspell.json).
        run: npm run lint:spell

      - name: Performance & SEO budgets
        # Lighthouse CI audits the built site against the thresholds in
        # lighthouserc.json (SEO / accessibility / best-practices fail the
        # build below 0.9; performance only warns, as it's machine-dependent).
        run: npm run test:lighthouse
