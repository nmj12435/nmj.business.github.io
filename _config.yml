# Site settings for the GitHub Pages / Jekyll site.
# See https://jekyllrb.com/docs/configuration/ for all available options.

title: NMJ Business
description: >-
  Original SVG cut files for Cricut, Silhouette, and Glowforge. Instant
  digital downloads from the NMJ Business Etsy shop.
email: nmj.businessplan@gmail.com
url: "https://nmj12435.github.io"
# Required by the jekyll-github-metadata plugin (pulled in by github-pages).
repository: nmj12435/nmj.business.github.io

# Build settings
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  # Generates /sitemap.xml, used by the CI accessibility scan to discover
  # every page automatically (so new pages are covered without editing CI).
  - jekyll-sitemap

# Exclude files that should never be part of the built site.
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - .github
  - node_modules
  - package.json
  - package-lock.json
  - .pa11yci
